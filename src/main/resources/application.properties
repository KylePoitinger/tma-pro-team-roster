# Enabling H2 Console
spring.h2.console.enabled=true

# Kafka Configuration (Disabled by default to avoid connection noise if broker is missing)
spring.kafka.enabled=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.auto-create=false
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=pro-team-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=main.java.dto

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Suppress Kafka logs to avoid "false alarm" connection warnings
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR