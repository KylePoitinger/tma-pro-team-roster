# Enabling H2 Console
spring.h2.console.enabled=true

# Database Configuration (Defaults to H2 in-memory)
# To use SQLite (allows viewing via SQLite GUI tools), uncomment the SQLite section below and comment out H2 if needed.
# By default, we are now enabling SQLite as requested to allow external viewing.

# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:pro_team_roster.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Kafka Configuration (Disabled by default to avoid connection noise if broker is missing)
spring.kafka.enabled=false
spring.kafka.bootstrap-servers=127.0.0.1:9092
spring.kafka.admin.auto-create=false
spring.kafka.admin.fail-fast=false
spring.kafka.consumer.group-id=pro-team-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=main.java.dto

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Suppress Kafka logs to avoid "false alarm" connection warnings
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR

# Project Logging Level
logging.level.main.java=INFO