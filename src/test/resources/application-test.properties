# Disable Kafka for tests by default to avoid connection timeouts and noise
spring.kafka.enabled=false
spring.kafka.admin.auto-create=false
spring.kafka.admin.fail-fast=false

# Use H2 in-memory database for tests to ensure a clean state
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Suppress Kafka logs during tests
logging.level.org.apache.kafka=ERROR
logging.level.org.springframework.kafka=ERROR

# Project Logging Level for Tests
logging.level.main.java=TEST
